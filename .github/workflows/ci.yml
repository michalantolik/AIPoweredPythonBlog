name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  django:
    name: Django checks, migrations, tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ai_powered_blog
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_powered_blog"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_ENV: dev
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      DJANGO_TIME_ZONE: UTC

      DJANGO_DB_ENGINE: django.db.backends.postgresql
      DJANGO_DB_NAME: ai_powered_blog
      DJANGO_DB_USER: postgres
      DJANGO_DB_PASSWORD: postgres
      DJANGO_DB_HOST: 127.0.0.1
      DJANGO_DB_PORT: 5432

      INTRO_OVERLAY_ENABLED: "0"
      SHOW_SIDEBAR_ON_HOME_STARTUP: "0"

    defaults:
      run:
        working-directory: AIPoweredPythonBlog/ai_powered_blog

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: AIPoweredPythonBlog/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ../requirements.txt

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run Django system checks
        run: python manage.py check

      - name: Run Django deployment checks
        env:
          DJANGO_ENV: prod
          DJANGO_SECRET_KEY: ci-prod-secret-key-that-is-long-and-random-1234567890
          DJANGO_DEBUG: "0"
          DJANGO_ALLOWED_HOSTS: example.com
          DJANGO_CSRF_TRUSTED_ORIGINS: https://example.com
          DJANGO_SECURE_SSL_REDIRECT: "1"
          DJANGO_SECURE_HSTS_SECONDS: "3600"
        run: python manage.py check --deploy

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Collect static files
        run: python manage.py collectstatic --noinput

      - name: Run test suite
        run: python manage.py test --verbosity 2

  docker:
    name: Docker build validation
    runs-on: ubuntu-latest
    needs:
      - django
      - playwright

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./AIPoweredPythonBlog
          file: ./AIPoweredPythonBlog/Dockerfile
          push: false
          tags: ai-powered-python-blog:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
