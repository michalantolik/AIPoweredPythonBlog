{% load plantuml_tags %}
{% plantuml_svg_url value.source as svg_url %}

<section class="article-plantuml article-width-{{ value.width }}">
    <div class="article-plantuml__frame">
        {% if value.caption %}
            <div class="article-plantuml__toolbar">
                <div class="article-plantuml__caption">{{ value.caption }}</div>
            </div>
        {% endif %}

        <div class="article-plantuml__canvas">
            {% if svg_url %}
                <img
                    class="article-plantuml__image"
                    src="{{ svg_url }}"
                    alt="{% if value.caption %}{{ value.caption }}{% else %}PlantUML diagram{% endif %}"
                    loading="lazy"
                    decoding="async"
                >
            {% else %}
                <div class="article-plantuml__error">
                    <strong>PlantUML diagram is empty.</strong>
                </div>
            {% endif %}
        </div>
    </div>
</section>
