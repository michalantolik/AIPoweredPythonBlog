<section class="article-mermaid article-width-{{ value.width }}">
    <div class="article-mermaid__frame">
        {% if value.caption %}
            <div class="article-mermaid__toolbar">
                <div class="article-mermaid__caption">{{ value.caption }}</div>
            </div>
        {% endif %}

        <div class="article-mermaid__canvas">
            <div class="mermaid">{{ value.diagram }}</div>
        </div>
    </div>
</section>
