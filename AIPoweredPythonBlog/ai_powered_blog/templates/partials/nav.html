<nav class="site-nav">
    <div class="shell nav-shell">
        <a class="brand" href="{% url 'website:home' %}">
            <span class="brand-logo">&lt;/&gt;</span>
            <span class="brand-copy">
                <span class="brand-title">AI Powered Python Blog</span>
                <span class="brand-subtitle">software developer notes</span>
            </span>
        </a>

        <div class="nav-links">
            <a href="{% url 'website:home' %}" class="{% if request.path == '/' %}active{% endif %}">
                Home
            </a>

            {% for tag in categories|slice:":4" %}
                <a
                    href="{% url 'website:home' %}?category={{ tag.slug }}"
                    class="{% if selected_category and selected_category.slug == tag.slug and request.path == '/' %}active{% endif %}"
                >
                    {{ tag.name }}
                </a>
            {% endfor %}

            <a href="{% url 'website:about' %}" class="{% if request.path == '/about/' %}active{% endif %}">
                About
            </a>
        </div>
    </div>
</nav>
