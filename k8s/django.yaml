apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-powered-blog-web
  namespace: ai-blog-local
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-powered-blog-web
  template:
    metadata:
      labels:
        app: ai-powered-blog-web
    spec:
      containers:
        - name: web
          image: ai-powered-blog:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: django-config
            - secretRef:
                name: django-secret
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-powered-blog-web
  namespace: ai-blog-local
spec:
  selector:
    app: ai-powered-blog-web
  ports:
    - port: 8000
      targetPort: 8000
